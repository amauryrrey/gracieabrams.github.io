    <div class="progress-bar-container">
      <div id="progress-bar" class="progress-bar"></div>

      <input type="text" id="guess-input" placeholder="Type your guess here...">

  </div>
  <div id="mode-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Select Mode</h2>
        <span class="close-btn" id="close-modal">&times;</span>
      </div>
      <div class="modal-body mode-selection">
        <button class="modal-btn" onclick="selectMode('all')">All Songs</button>
        <button class="modal-btn" onclick="selectMode('dfh')">Daughter from Hell</button>
